# CI Test Dashboard Configuration
#
# ============================================================================
# CUSTOMIZE THIS FILE FOR YOUR TEAM
# ============================================================================
#
# This example is configured for monitoring OpenShift CI periodic jobs.
# To use for your team:
# 1. Update job_names below to match your periodic CI jobs
# 2. Adjust versions and platforms in the tracking section
# 3. Update blocklist with test IDs to exclude
# 4. Deploy locally or to OpenShift
#
# Example job patterns for different teams:
#   - Networking: "periodic-ci-*-network-*", "periodic-ci-*-ovn-*"
#   - Storage:    "periodic-ci-*-storage-*", "periodic-ci-*-csi-*"
#   - Your team:  "periodic-ci-*-{your-component}-*"
# ============================================================================

# Data collector configuration
collector:
  # Type of collector: "reportportal", "prow_mcp", "prow_gcs", "gcsweb"
  # Recommended: gcsweb (no authentication required)
  type: "gcsweb"

  # gcsweb configuration (OpenShift CI web interface - no auth needed!)
  gcsweb:
    # Base URL
    url: "https://gcsweb-ci.apps.ci.l2s4.p1.openshiftapps.com"
    bucket: "test-platform-results"

    # ========================================================================
    # CUSTOMIZE: Job names to monitor for your team
    # Find your periodic job names at: https://prow.ci.openshift.org/
    # ========================================================================
    job_names:
      # Example: Replace these with your actual job names
      - "periodic-ci-openshift-COMPONENT-release-4.XX-amd64-nightly-aws-e2e"
      - "periodic-ci-openshift-COMPONENT-release-4.XX-amd64-nightly-azure-e2e"
      - "periodic-ci-openshift-COMPONENT-release-4.XX-amd64-nightly-gcp-e2e"

    # How many recent builds to fetch per job
    max_builds_per_job: 20

    # Parallel processing
    max_workers: 3

  # ReportPortal configuration (optional - requires authentication)
  reportportal:
    url: "https://reportportal-openshift.apps.dno.ocp-hub.prod.psi.redhat.com"
    project: "prow"
    # API token from environment variable: REPORTPORTAL_API_TOKEN

    # Job patterns (supports {version} placeholder)
    job_patterns:
      - "periodic-ci-openshift-COMPONENT-release-{version}-*"
      - "pull-ci-openshift-COMPONENT-release-{version}-*"

    # API settings
    page_size: 150
    max_pages: 10
    max_workers: 5

# Tracking configuration
tracking:
  # ========================================================================
  # CUSTOMIZE: OpenShift versions to monitor for your team
  # ========================================================================
  versions:
    - "4.17"
    - "4.18"

  # ========================================================================
  # CUSTOMIZE: Cloud platforms to track for your team
  # Common platforms: aws, azure, gcp, vsphere, nutanix, metal, alibabacloud
  # ========================================================================
  platforms:
    - "aws"
    - "azure"
    - "gcp"

  # ========================================================================
  # CUSTOMIZE: Test suite filter - only collect tests matching this pattern
  #
  # Examples for different teams:
  #   - Networking:         "Networking"
  #   - Storage:            "Storage"
  #   - Windows Containers: "Windows_Containers"
  #   - Leave empty to collect all tests (no filter)
  #
  # The filter checks if this string appears in the raw test name/description
  # ========================================================================
  test_suite_filter: ""

  # How many days to look back when collecting data
  lookback_days: 30

  # ========================================================================
  # CUSTOMIZE: Blocklist - exclude specific test IDs from dashboard
  # Add test IDs that should not appear in your team's dashboard
  # ========================================================================
  blocklist:
    - "OCP-00000"  # Example: test no longer relevant

# Database configuration
database:
  # Path to SQLite database file
  path: "/data/dashboard.db"

# Web server configuration
web:
  host: "0.0.0.0"
  port: 8080
  debug: false

# Collection schedule (for automated runs)
schedule:
  # Run data collection automatically
  enabled: false

  # Cron expression (e.g., "0 9 * * *" for daily at 9 AM)
  cron: "0 9 * * *"
